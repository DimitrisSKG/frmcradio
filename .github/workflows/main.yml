name: 24/7 Discord Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *' # Ελέγχει και ξαναξεκινάει κάθε 30 λεπτά
  workflow_dispatch: # Σου επιτρέπει να το ξεκινάς και χειροκίνητα

jobs:
  run:
    runs-on: ubuntu-latest
    # Προσθέτουμε αυτό για να μην τρέχουν πολλά bot ταυτόχρονα αν συμπέσουν τα workflows
    concurrency:
      group: discord-bot
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install -r requirements.txt

      - name: Run Bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Πρόσθεσε αυτή τη γραμμή
          MP3_URL: ${{ secrets.MP3_URL }} 
        run: python bot.py